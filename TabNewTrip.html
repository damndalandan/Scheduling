<!-- TabNewTrip.html — New Trip Request Tab -->
<style>
  #tab-new-trip, #tab-new-trip * { color: var(--text); }
  .nt-card { max-width: 800px; margin: 0 auto; }
  .nt-time-row { display:flex; gap:6px; align-items:center; }
  .nt-time-row input[type="date"] { flex: 1.6; }
  .nt-time-row select { flex: 1; min-width: 0; padding-left: 8px; }
  .nt-dropdown {
    display:none; position:absolute; z-index:200; left:0; right:0; top:100%;
    background:var(--surface); border:1.5px solid var(--accent); border-radius:10px;
    max-height:200px; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.5); margin-top:3px;
  }
  .nt-dropdown-item {
    padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .12s;
  }
  .nt-dropdown-item:last-child { border-bottom:none; }
  .nt-dropdown-item:hover { background:var(--amber-bg); }
  .nt-dropdown-item .item-name { font-size:13px; font-weight:600; color:var(--text); }
  .nt-dropdown-item .item-sub  { font-size:11px; color:var(--text3); margin-top:2px; }
</style>

<div style="padding:24px 28px 40px;">
  <div style="max-width:800px;margin:0 auto;">

    <div style="margin-bottom:22px;">
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;">New Trip Request</h2>
      <p style="font-size:13px;color:var(--text3);margin:0;">I-fill ang details sa imong trip request</p>
    </div>

    <div class="o-card" style="padding:24px;">

      <!-- Requestor Info -->
      <div class="o-divider" style="margin-top:0;">Requestor Information</div>
      <div class="o-form-grid" style="margin-bottom:18px;">

        <div class="o-form-group" style="position:relative;">
          <label class="o-label">Requestor Name *</label>
          <input id="nt-req-name" class="o-input" placeholder="Type or select employee…"
            autocomplete="off"
            oninput="nt_filterReq()"
            onfocus="nt_showReqDropdown()"
            onblur="setTimeout(nt_hideReqDropdown, 200)">
          <div id="nt-req-dropdown" class="nt-dropdown">
            <div id="nt-req-list"></div>
          </div>
        </div>

        <div class="o-form-group">
          <label class="o-label">Employee ID <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
          <input id="nt-req-empid" class="o-input" placeholder="Auto-filled or e.g. EMP-001">
        </div>
      </div>

      <!-- Trip Details -->
      <div class="o-divider">Trip Details</div>
      <div class="o-form-grid" style="margin-bottom:18px;">
        <div class="o-form-group">
          <label class="o-label">Trip Type *</label>
          <select id="nt-trip-type" class="o-input">
            <option value="">-- Select Type --</option>
            <option>Owner Errand</option>
            <option>Supplier Delivery - Ormoc</option>
            <option>Supplier Delivery - Outside Ormoc</option>
            <option>Signage Installation</option>
            <option>Other</option>
          </select>
        </div>
        <div class="o-form-group" style="position:relative;">
          <label class="o-label">Related JO <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
          <div style="position:relative;">
            <input id="nt-jo-search" class="o-input" placeholder="Search JO number or description…"
              autocomplete="off"
              oninput="nt_filterJO()"
              onfocus="nt_showJODropdown()"
              onblur="setTimeout(nt_hideJODropdown, 200)"
              style="padding-right:80px;">
            <div id="nt-jo-selected-badge" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);
              background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:6px;
              padding:2px 8px;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;">
            </div>
          </div>
          <div id="nt-jo-dropdown" style="display:none;position:absolute;z-index:200;left:0;right:0;top:100%;
            background:var(--surface);border:1.5px solid var(--accent);border-radius:10px;
            max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);margin-top:3px;">
            <div id="nt-jo-list"></div>
          </div>
          <input type="hidden" id="nt-related-jo">
        </div>
        <div class="o-form-group span2">
          <label class="o-label">Purpose *</label>
          <textarea id="nt-purpose" class="o-input" placeholder="Describe the purpose of this trip…"></textarea>
        </div>
      </div>

      <!-- Route & Schedule -->
      <div class="o-divider">Route & Schedule</div>
      <div class="o-form-grid" style="margin-bottom:18px;">
        <div class="o-form-group">
          <label class="o-label">From Location *</label>
          <input id="nt-from" class="o-input" placeholder="e.g. Ormoc City Hall">
        </div>
        <div class="o-form-group">
          <label class="o-label">To Location *</label>
          <input id="nt-to" class="o-input" placeholder="e.g. Cebu Supplier Warehouse">
        </div>

        <div class="o-form-group">
          <label class="o-label">Planned Start *</label>
          <div class="nt-time-row">
            <input type="date" id="nt-start-date-d" class="o-input">
            <select id="nt-start-hour" class="o-input">
              <option value="">hh</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option>8</option>
              <option>9</option><option>10</option><option>11</option><option>12</option>
            </select>
            <select id="nt-start-min" class="o-input">
              <option value="">mm</option>
              <option>00</option><option>15</option><option>30</option><option>45</option>
            </select>
            <select id="nt-start-ampm" class="o-input">
              <option value="">AM/PM</option><option>AM</option><option>PM</option>
            </select>
          </div>
          <input type="hidden" id="nt-start-date">
        </div>

        <div class="o-form-group">
          <label class="o-label">Planned End *</label>
          <div class="nt-time-row">
            <input type="date" id="nt-end-date-d" class="o-input">
            <select id="nt-end-hour" class="o-input">
              <option value="">hh</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option>8</option>
              <option>9</option><option>10</option><option>11</option><option>12</option>
            </select>
            <select id="nt-end-min" class="o-input">
              <option value="">mm</option>
              <option>00</option><option>15</option><option>30</option><option>45</option>
            </select>
            <select id="nt-end-ampm" class="o-input">
              <option value="">AM/PM</option><option>AM</option><option>PM</option>
            </select>
          </div>
          <input type="hidden" id="nt-end-date">
        </div>
      </div>

      <!-- Vehicle & Driver -->
      <div class="o-divider">Vehicle & Driver</div>
      <div id="nt-veh-note" class="o-alert o-alert-info" style="margin-bottom:14px;font-size:12px;">
        ℹ️ Vehicle ug Driver pwede i-fill later. Required lang kung i-submit na.
      </div>
      <div class="o-form-grid" style="margin-bottom:18px;">
        <div class="o-form-group">
          <label class="o-label">Vehicle</label>
          <select id="nt-vehicle-id" class="o-input" onchange="nt_onVehicleChange()">
            <option value="">-- Select Vehicle --</option>
          </select>
        </div>
        <div class="o-form-group">
          <label class="o-label">Plate Number</label>
          <input id="nt-plate" class="o-input" placeholder="Auto-filled" readonly
            style="background:var(--surface);cursor:not-allowed;color:var(--text2);">
        </div>

        <div class="o-form-group" style="position:relative;">
          <label class="o-label">Driver Name</label>
          <input id="nt-driver-name" class="o-input" placeholder="Type or select driver…"
            autocomplete="off"
            oninput="nt_filterDriver()"
            onfocus="nt_showDriverDropdown()"
            onblur="setTimeout(nt_hideDriverDropdown, 200)">
          <div id="nt-driver-dropdown" class="nt-dropdown">
            <div id="nt-driver-list"></div>
          </div>
        </div>

        <div class="o-form-group">
          <label class="o-label">Driver Employee ID <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
          <input id="nt-driver-empid" class="o-input" placeholder="Auto-filled or e.g. EMP-002">
        </div>
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);">
        <button class="o-btn o-btn-ghost" onclick="nt_reset()">Clear</button>
        <button id="nt-draft-btn" class="o-btn o-btn-ghost" onclick="nt_saveTrip('Draft')">💾 Save as Draft</button>
        <button id="nt-submit-btn" class="o-btn o-btn-primary" onclick="nt_saveTrip('Submitted')">📤 Submit for Approval</button>
      </div>

    </div>
  </div>
</div>

<script>
var nt_vehicles       = [];
var nt_drivers        = [];
var nt_driverFiltered = [];
var nt_employees      = [];   // from EmployeeName sheet
var nt_empFiltered    = [];
var nt_joList         = [];
var nt_joFiltered     = [];

function init_new_trip() {
  document.getElementById('nt-jo-search').placeholder = 'Loading…';
  document.getElementById('nt-jo-search').disabled = true;

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) { o_toast('error', r.message || 'Init failed'); return; }

      // Vehicles
      nt_vehicles = (r.vehicles || []).filter(function(v) { return v.status === 'Active'; });
      nt_populateVehicles();

      // Drivers (Active only) from Driver Master
      nt_drivers        = (r.drivers || []).filter(function(d) { return d.status === 'Active'; });
      nt_driverFiltered = nt_drivers.slice();

      // Employees from EmployeeName sheet
      nt_employees   = r.employees || [];
      nt_empFiltered = nt_employees.slice();

      // JO list
      nt_joList     = r.joList || [];
      nt_joFiltered = nt_joList.slice();
      var joInput   = document.getElementById('nt-jo-search');
      joInput.disabled    = false;
      joInput.placeholder = nt_joList.length
        ? 'Search JO number or description… (' + nt_joList.length + ' JOs)'
        : (r.joError || 'No JOs found');
      if (r.joError) joInput.title = r.joError;
    })
    .withFailureHandler(function(e) {
      document.getElementById('nt-jo-search').disabled = false;
      document.getElementById('nt-jo-search').placeholder = 'Error loading — type manually';
      o_toast('error', 'Init failed: ' + e.message);
    })
    .getTripsInitData();
}

// ══════════════════════════════════════
//  REQUESTOR DROPDOWN (EmployeeName sheet)
// ══════════════════════════════════════
function nt_filterReq() {
  var q = (document.getElementById('nt-req-name').value || '').toLowerCase().trim();
  // Clear empid if user types manually
  document.getElementById('nt-req-empid').value = '';
  nt_empFiltered = q
    ? nt_employees.filter(function(e) {
        return e.name.toLowerCase().includes(q) || e.empCode.toLowerCase().includes(q);
      })
    : nt_employees.slice();
  nt_renderReqList();
  nt_showReqDropdown();
}

function nt_renderReqList() {
  var container = document.getElementById('nt-req-list');
  if (!nt_empFiltered.length) {
    container.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:var(--text3);">Walay nakit-an — pwede manual type.</div>';
    return;
  }
  var html = '';
  nt_empFiltered.slice(0, 60).forEach(function(e, i) {
    html += '<div class="nt-dropdown-item" data-emp-idx="' + i + '">'
          +   '<div class="item-name">' + o_esc(e.name) + '</div>'
          +   '<div class="item-sub">' + o_esc(e.empCode) + (e.team ? ' · ' + o_esc(e.team) : '') + '</div>'
          + '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.nt-dropdown-item').forEach(function(el) {
    var idx = parseInt(el.getAttribute('data-emp-idx'));
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      document.getElementById('nt-req-name').value  = nt_empFiltered[idx].name;
      document.getElementById('nt-req-empid').value = nt_empFiltered[idx].empCode;
      nt_hideReqDropdown();
    });
  });
}

function nt_showReqDropdown() {
  nt_renderReqList();
  document.getElementById('nt-req-dropdown').style.display = 'block';
}
function nt_hideReqDropdown() {
  document.getElementById('nt-req-dropdown').style.display = 'none';
}

// ══════════════════════════════════════
//  DRIVER DROPDOWN (Driver Master)
// ══════════════════════════════════════
function nt_filterDriver() {
  var q = (document.getElementById('nt-driver-name').value || '').toLowerCase().trim();
  document.getElementById('nt-driver-empid').value = '';
  nt_driverFiltered = q
    ? nt_drivers.filter(function(d) {
        return d.name.toLowerCase().includes(q) || (d.licenseId || '').toLowerCase().includes(q);
      })
    : nt_drivers.slice();
  nt_renderDriverList();
  nt_showDriverDropdown();
}

function nt_renderDriverList() {
  var container = document.getElementById('nt-driver-list');
  if (!nt_driverFiltered.length) {
    container.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:var(--text3);">Walay nakit-an — pwede manual type.</div>';
    return;
  }
  var html = '';
  nt_driverFiltered.slice(0, 50).forEach(function(d, i) {
    html += '<div class="nt-dropdown-item" data-drv-idx="' + i + '">'
          +   '<div class="item-name">' + o_esc(d.name) + '</div>'
          +   '<div class="item-sub">🪪 ' + o_esc(d.licenseId) + (d.empId ? ' · ' + o_esc(d.empId) : '') + '</div>'
          + '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.nt-dropdown-item').forEach(function(el) {
    var idx = parseInt(el.getAttribute('data-drv-idx'));
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      document.getElementById('nt-driver-name').value  = nt_driverFiltered[idx].name;
      document.getElementById('nt-driver-empid').value = nt_driverFiltered[idx].empId || '';
      nt_hideDriverDropdown();
    });
  });
}

function nt_showDriverDropdown() {
  nt_renderDriverList();
  document.getElementById('nt-driver-dropdown').style.display = 'block';
}
function nt_hideDriverDropdown() {
  document.getElementById('nt-driver-dropdown').style.display = 'none';
}

// ══════════════════════════════════════
//  JO DROPDOWN
// ══════════════════════════════════════
function nt_filterJO() {
  var q = (document.getElementById('nt-jo-search').value || '').toLowerCase().trim();
  nt_joFiltered = q
    ? nt_joList.filter(function(j) {
        return j.joNumber.toLowerCase().includes(q) || j.jobDesc.toLowerCase().includes(q);
      })
    : nt_joList.slice();
  document.getElementById('nt-related-jo').value = '';
  document.getElementById('nt-jo-selected-badge').style.display = 'none';
  nt_renderJOList();
  nt_showJODropdown();
}

function nt_renderJOList() {
  var container = document.getElementById('nt-jo-list');
  if (!nt_joFiltered.length) {
    container.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text3);text-align:center;">Walay nakit-an nga JO.</div>';
    return;
  }
  var slice = nt_joFiltered.slice(0, 80);
  var rows  = '';
  for (var i = 0; i < slice.length; i++) {
    rows += '<div class="nt-jo-item" data-idx="' + i + '">'
          +   '<div style="font-family:DM Mono,monospace;font-size:12px;font-weight:700;color:var(--accent);">' + o_esc(slice[i].joNumber) + '</div>'
          +   '<div style="font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + o_esc(slice[i].jobDesc || '—') + '</div>'
          + '</div>';
  }
  container.innerHTML = rows;
  container.querySelectorAll('.nt-jo-item').forEach(function(el) {
    var idx = parseInt(el.getAttribute('data-idx'));
    el.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;';
    el.addEventListener('mouseenter', function() { this.style.background = 'var(--amber-bg)'; });
    el.addEventListener('mouseleave', function() { this.style.background = 'transparent'; });
    el.addEventListener('mousedown', function(ev) {
      ev.preventDefault();
      document.getElementById('nt-related-jo').value      = slice[idx].joNumber;
      document.getElementById('nt-jo-search').value       = slice[idx].joNumber + (slice[idx].jobDesc ? ' — ' + slice[idx].jobDesc : '');
      document.getElementById('nt-jo-selected-badge').style.display = 'block';
      document.getElementById('nt-jo-selected-badge').textContent   = slice[idx].joNumber;
      nt_hideJODropdown();
    });
  });
  if (nt_joFiltered.length > 80) {
    var more = document.createElement('div');
    more.style.cssText = 'padding:8px 14px;font-size:11px;color:var(--text3);text-align:center;';
    more.textContent = '+ ' + (nt_joFiltered.length - 80) + ' more — refine your search';
    container.appendChild(more);
  }
}

function nt_showJODropdown() {
  nt_renderJOList();
  document.getElementById('nt-jo-dropdown').style.display = 'block';
}
function nt_hideJODropdown() {
  document.getElementById('nt-jo-dropdown').style.display = 'none';
}

// ══════════════════════════════════════
//  VEHICLE
// ══════════════════════════════════════
function nt_populateVehicles() {
  var sel = document.getElementById('nt-vehicle-id');
  sel.innerHTML = '<option value="">-- Select Vehicle --</option>'
    + nt_vehicles.map(function(v) {
        return '<option value="' + o_esc(v.vehicleId) + '" data-plate="' + o_esc(v.plate) + '">'
          + o_esc(v.plate) + ' — ' + o_esc(v.type) + (v.brand ? ' (' + o_esc(v.brand) + ')' : '')
          + '</option>';
      }).join('');
}

function nt_onVehicleChange() {
  var sel = document.getElementById('nt-vehicle-id');
  var opt = sel.options[sel.selectedIndex];
  document.getElementById('nt-plate').value = opt ? (opt.getAttribute('data-plate') || '') : '';
}

// ══════════════════════════════════════
//  DATETIME 12-HOUR AM/PM
// ══════════════════════════════════════
function nt_buildDatetime(prefix) {
  var d = document.getElementById(prefix + '-date-d').value;
  var h = document.getElementById(prefix + '-hour').value;
  var m = document.getElementById(prefix + '-min').value;
  var a = document.getElementById(prefix + '-ampm').value;
  if (!d || !h || !m || !a) return '';
  var h24 = parseInt(h);
  if (a === 'AM') { if (h24 === 12) h24 = 0; }
  else            { if (h24 !== 12) h24 += 12; }
  return d + 'T' + (h24 < 10 ? '0' : '') + h24 + ':' + m;
}

function nt_syncDatetimes() {
  document.getElementById('nt-start-date').value = nt_buildDatetime('nt-start');
  document.getElementById('nt-end-date').value   = nt_buildDatetime('nt-end');
}

// ══════════════════════════════════════
//  RESET
// ══════════════════════════════════════
function nt_reset() {
  ['nt-req-name','nt-req-empid','nt-related-jo','nt-purpose',
   'nt-from','nt-to','nt-start-date','nt-end-date','nt-start-date-d','nt-end-date-d',
   'nt-driver-name','nt-driver-empid','nt-plate'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  ['nt-start-hour','nt-start-min','nt-start-ampm',
   'nt-end-hour','nt-end-min','nt-end-ampm'].forEach(function(id) {
    document.getElementById(id).selectedIndex = 0;
  });
  document.getElementById('nt-trip-type').value  = '';
  document.getElementById('nt-vehicle-id').value = '';
  document.getElementById('nt-jo-search').value  = '';
  document.getElementById('nt-jo-selected-badge').style.display = 'none';
  nt_hideJODropdown(); nt_hideDriverDropdown(); nt_hideReqDropdown();
}

// ══════════════════════════════════════
//  SAVE / SUBMIT
// ══════════════════════════════════════
function nt_saveTrip(status) {
  nt_syncDatetimes();
  var reqName   = document.getElementById('nt-req-name').value.trim();
  var tripType  = document.getElementById('nt-trip-type').value;
  var purpose   = document.getElementById('nt-purpose').value.trim();
  var fromLoc   = document.getElementById('nt-from').value.trim();
  var toLoc     = document.getElementById('nt-to').value.trim();
  var startDate = document.getElementById('nt-start-date').value;
  var endDate   = document.getElementById('nt-end-date').value;

  if (!reqName)   { o_toast('error', 'Requestor Name required.'); return; }
  if (!tripType)  { o_toast('error', 'Trip Type required.'); return; }
  if (!purpose)   { o_toast('error', 'Purpose required.'); return; }
  if (!fromLoc)   { o_toast('error', 'From Location required.'); return; }
  if (!toLoc)     { o_toast('error', 'To Location required.'); return; }
  if (!startDate) { o_toast('error', 'Planned Start required.'); return; }
  if (!endDate)   { o_toast('error', 'Planned End required.'); return; }

  var vehicleId  = document.getElementById('nt-vehicle-id').value;
  var driverName = document.getElementById('nt-driver-name').value.trim();

  if (status === 'Submitted') {
    if (!vehicleId)  { o_toast('error', 'Vehicle required para i-submit.'); return; }
    if (!driverName) { o_toast('error', 'Driver required para i-submit.'); return; }
  }

  var draftBtn  = document.getElementById('nt-draft-btn');
  var submitBtn = document.getElementById('nt-submit-btn');
  draftBtn.disabled = true; submitBtn.disabled = true;
  submitBtn.textContent = status === 'Submitted' ? 'Submitting…' : 'Saving…';

  google.script.run
    .withSuccessHandler(function(r) {
      draftBtn.disabled = false; submitBtn.disabled = false;
      submitBtn.textContent = '📤 Submit for Approval';
      if (r.success) {
        o_toast('success', r.message);
        nt_reset();
        initializedTabs['trips']     = false;
        initializedTabs['approval']  = false;
        initializedTabs['dashboard'] = false;
        var tripsPane = document.getElementById('tab-trips');
        if (tripsPane && tripsPane.classList.contains('active')) init_trips();
      } else { o_toast('error', r.message); }
    })
    .withFailureHandler(function(e) {
      draftBtn.disabled = false; submitBtn.disabled = false;
      submitBtn.textContent = '📤 Submit for Approval';
      o_toast('error', e.message);
    })
    .ops_saveTrip({
      reqName,
      reqEmpId    : document.getElementById('nt-req-empid').value.trim(),
      tripType, purpose,
      relatedJo   : document.getElementById('nt-related-jo').value.trim(),
      fromLoc, toLoc, startDate, endDate,
      vehicleId,
      plate       : document.getElementById('nt-plate').value.trim(),
      driverEmpId : document.getElementById('nt-driver-empid').value.trim(),
      driverName, status
    });
}
</script>
