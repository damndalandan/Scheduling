<!-- TabApproval.html — For Approval Tab -->
<style>
  #tab-approval, #tab-approval * { color: var(--text); }
</style>

<div style="padding:24px 28px 40px;">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:22px;">
    <div>
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;">For Approval</h2>
      <p style="font-size:13px;color:var(--text3);margin:0;">Mga trip nga nagahulat ug approval</p>
    </div>
    <button id="apr-reload-btn" class="o-btn-reload" onclick="apr_reload()">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Reload
    </button>
  </div>

  <div id="apr-access-warn" class="o-alert o-alert-warn" style="display:none;margin-bottom:16px;">
    ⚠️ Approver access ra ang makahimo ug approve/reject.
  </div>

  <div class="o-search-wrap" style="margin-bottom:14px;">
    <span class="o-search-icon">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
      </svg>
    </span>
    <input id="apr-search" class="o-input" placeholder="Search Trip ID, requestor, purpose…" oninput="apr_apply()">
  </div>

  <!-- Desktop table -->
  <div id="apr-table-wrap" class="o-table-wrap">
    <table class="o-table">
      <thead>
        <tr>
          <th>Trip ID</th><th>Request Date</th><th>Requestor</th>
          <th>Type</th><th>Route</th><th>Vehicle</th><th>Driver</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="apr-tbody"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div id="apr-cards" style="display:none;"></div>

</div>

<!-- Reject Modal -->
<div class="o-modal-overlay" id="apr-reject-modal">
  <div class="o-modal o-modal-sm">
    <div class="o-modal-header">
      <div class="o-modal-title">Reject Trip</div>
      <button class="o-modal-close" onclick="document.getElementById('apr-reject-modal').classList.remove('open')">✕</button>
    </div>
    <div class="o-modal-body">
      <div class="o-alert o-alert-error" style="margin-bottom:14px;">
        ❌ Ang trip ma-reject. Kinahanglan ug reason.
      </div>
      <div id="apr-reject-trip-info" style="font-size:13px;color:var(--text2);margin-bottom:14px;padding:10px;background:var(--surface2);border-radius:8px;"></div>
      <div class="o-form-group">
        <label class="o-label">Rejection Reason *</label>
        <textarea id="apr-reject-reason" class="o-input" placeholder="Ngano gi-reject? Required."></textarea>
      </div>
    </div>
    <div class="o-modal-footer">
      <button class="o-btn o-btn-ghost" onclick="document.getElementById('apr-reject-modal').classList.remove('open')">Back</button>
      <button id="apr-reject-btn" class="o-btn o-btn-danger" onclick="apr_submitReject()">Confirm Reject</button>
    </div>
  </div>
</div>

<!-- Approve Confirm Modal -->
<div class="o-modal-overlay" id="apr-approve-modal">
  <div class="o-modal o-modal-sm">
    <div class="o-modal-header">
      <div class="o-modal-title">Approve Trip</div>
      <button class="o-modal-close" onclick="document.getElementById('apr-approve-modal').classList.remove('open')">✕</button>
    </div>
    <div class="o-modal-body">
      <div class="o-alert o-alert-success" style="margin-bottom:14px;">
        ✅ I-approve ang trip?
      </div>
      <div id="apr-approve-trip-info" style="font-size:13px;color:var(--text2);padding:10px;background:var(--surface2);border-radius:8px;"></div>
    </div>
    <div class="o-modal-footer">
      <button class="o-btn o-btn-ghost" onclick="document.getElementById('apr-approve-modal').classList.remove('open')">Cancel</button>
      <button id="apr-approve-btn" class="o-btn o-btn-success" onclick="apr_submitApprove()">✅ Yes, Approve</button>
    </div>
  </div>
</div>

<script>
var apr_all = [], apr_filtered = [], apr_actionId = null;

function init_approval() {
  document.getElementById('apr-tbody').innerHTML = o_skelRows(8, 4);
  google.script.run
    .withSuccessHandler(function(r) {
      o_setReloading('apr-reload-btn', false);
      if (!r.success) { o_toast('error', r.message); return; }
      apr_all = r.trips || [];
      apr_apply();
    })
    .withFailureHandler(function(e) {
      o_setReloading('apr-reload-btn', false);
      o_toast('error', e.message);
    })
    .getApprovalInitData();
}

function apr_reload() {
  o_setReloading('apr-reload-btn', true);
  initializedTabs['approval'] = false;
  init_approval();
}

function apr_apply() {
  var q = (document.getElementById('apr-search').value || '').toLowerCase();
  apr_filtered = apr_all.filter(function(t) {
    if (!q) return true;
    return (t.tripId + t.reqName + t.purpose + t.fromLoc + t.toLoc).toLowerCase().includes(q);
  });
  apr_render();
}

function apr_render() {
  var tb = document.getElementById('apr-tbody');
  if (!apr_filtered.length) {
    tb.innerHTML = '<tr><td colspan="8"><div class="o-empty"><div class="o-empty-icon">✅</div><p>Walay pending nga approval.</p></div></td></tr>';
    document.getElementById('apr-cards').innerHTML = '';
    return;
  }
  tb.innerHTML = apr_filtered.map(function(t) {
    return '<tr>'
      + '<td class="td-id">' + o_esc(t.tripId) + '</td>'
      + '<td style="font-size:12px;color:var(--text3);">' + o_esc(t.requestDate || '—') + '</td>'
      + '<td style="font-weight:600;">' + o_esc(t.reqName) + '</td>'
      + '<td style="font-size:12px;">' + o_esc(t.tripType) + '</td>'
      + '<td style="font-size:12px;">' + o_esc(t.fromLoc) + ' → ' + o_esc(t.toLoc) + '</td>'
      + '<td style="font-weight:600;">' + o_esc(t.plate || '—') + '</td>'
      + '<td>' + o_esc(t.driverName || '—') + '</td>'
      + '<td><div class="td-actions">'
      + '<button class="o-btn o-btn-success o-btn-sm" onclick="apr_openApprove(\'' + o_esc(t.tripId) + '\')">✅ Approve</button>'
      + '<button class="o-btn o-btn-danger o-btn-sm"  onclick="apr_openReject(\'' + o_esc(t.tripId)  + '\')">❌ Reject</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');

  document.getElementById('apr-cards').innerHTML = apr_filtered.map(function(t) {
    return '<div class="o-card" style="padding:14px;margin-bottom:10px;">'
      + '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">'
      + '<span class="mono" style="font-size:12px;color:var(--text3);">' + o_esc(t.tripId) + '</span>'
      + o_statusBadge(t.status)
      + '</div>'
      + '<div style="font-weight:700;margin-bottom:2px;">' + o_esc(t.reqName) + '</div>'
      + '<div style="font-size:12px;color:var(--text3);margin-bottom:4px;">' + o_esc(t.fromLoc) + ' → ' + o_esc(t.toLoc) + '</div>'
      + '<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">' + o_esc(t.purpose) + '</div>'
      + '<div style="display:flex;gap:8px;">'
      + '<button class="o-btn o-btn-success o-btn-sm" onclick="apr_openApprove(\'' + o_esc(t.tripId) + '\')">✅ Approve</button>'
      + '<button class="o-btn o-btn-danger o-btn-sm"  onclick="apr_openReject(\'' + o_esc(t.tripId)  + '\')">❌ Reject</button>'
      + '</div></div>';
  }).join('');
}

function apr_tripInfo(t) {
  return '<strong>' + o_esc(t.tripId) + '</strong> — ' + o_esc(t.reqName)
    + '<br><span style="color:var(--text3);font-size:12px;">' + o_esc(t.fromLoc) + ' → ' + o_esc(t.toLoc) + ' · ' + o_esc(t.tripType) + '</span>';
}

function apr_openApprove(id) {
  apr_actionId = id;
  var t = apr_all.find(function(x) { return x.tripId === id; });
  document.getElementById('apr-approve-trip-info').innerHTML = t ? apr_tripInfo(t) : id;
  document.getElementById('apr-approve-modal').classList.add('open');
}

function apr_openReject(id) {
  apr_actionId = id;
  var t = apr_all.find(function(x) { return x.tripId === id; });
  document.getElementById('apr-reject-trip-info').innerHTML = t ? apr_tripInfo(t) : id;
  document.getElementById('apr-reject-reason').value = '';
  document.getElementById('apr-reject-modal').classList.add('open');
}

function apr_submitApprove() {
  var btn = document.getElementById('apr-approve-btn');
  btn.disabled = true; btn.textContent = 'Approving…';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false; btn.textContent = '✅ Yes, Approve';
      if (r.success) {
        o_toast('success', r.message);
        document.getElementById('apr-approve-modal').classList.remove('open');
        apr_reload();
        initializedTabs['trips'] = false;
        initializedTabs['completion'] = false;
      } else { o_toast('error', r.message); }
    })
    .withFailureHandler(function(e) { btn.disabled = false; btn.textContent = '✅ Yes, Approve'; o_toast('error', e.message); })
    .ops_approveTrip(apr_actionId);
}

function apr_submitReject() {
  var reason = document.getElementById('apr-reject-reason').value.trim();
  if (!reason) { o_toast('error', 'Rejection reason required.'); return; }
  var btn = document.getElementById('apr-reject-btn');
  btn.disabled = true; btn.textContent = 'Rejecting…';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false; btn.textContent = 'Confirm Reject';
      if (r.success) {
        o_toast('success', r.message);
        document.getElementById('apr-reject-modal').classList.remove('open');
        apr_reload();
        initializedTabs['trips'] = false;
      } else { o_toast('error', r.message); }
    })
    .withFailureHandler(function(e) { btn.disabled = false; btn.textContent = 'Confirm Reject'; o_toast('error', e.message); })
    .ops_rejectTrip(apr_actionId, reason);
}

function apr_initLayout() {
  var mob = window.innerWidth < 640;
  document.getElementById('apr-table-wrap').style.display = mob ? 'none' : 'block';
  document.getElementById('apr-cards').style.display       = mob ? 'block' : 'none';
}
apr_initLayout();
window.addEventListener('resize', apr_initLayout);
</script>
