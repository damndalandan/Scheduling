<!-- TabLogin.html — Login / Access Gate -->
<style>
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 36px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
    text-align: center;
    animation: login-in .35s cubic-bezier(.22,1,.36,1);
  }

  @keyframes login-in {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .login-logo {
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    box-shadow: 0 8px 24px rgba(245,166,35,.35);
  }

  .login-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.03em;
    color: var(--text);
    margin-bottom: 4px;
  }

  .login-subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 28px;
  }

  .login-user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 20px;
    text-align: left;
  }

  .login-avatar {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #0f1117;
    flex-shrink: 0;
  }

  .login-user-email {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
  }

  .login-user-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 2px;
  }

  .login-role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-bd);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 22px;
  }

  .login-no-role {
    background: var(--red-bg);
    border: 1px solid var(--red-bd);
    color: var(--red);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .login-btn {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f1117;
    font-size: 14px;
    font-weight: 800;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: -.01em;
  }
  .login-btn:hover  { background: var(--accent2); }
  .login-btn:active { transform: scale(.98); }
  .login-btn:disabled {
    background: var(--surface2);
    color: var(--text3);
    cursor: not-allowed;
    border: 1.5px solid var(--border);
  }

  .login-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 10px 0 20px;
  }

  .login-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: o-spin .7s linear infinite;
  }

  .login-loading-text {
    font-size: 13px;
    color: var(--text3);
    font-weight: 600;
  }

  .login-footer {
    margin-top: 20px;
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
  }
</style>

<div id="login-screen">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <svg width="26" height="26" fill="none" stroke="#0f1117" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M8 7h12m0 0l-4-4m4 4l-4 4M4 17h12m0 0l-4-4m4 4l-4 4"/>
      </svg>
    </div>

    <div class="login-title">OPS Trip Monitor</div>
    <div class="login-subtitle">Ormoc Printshoppe — Fleet Management</div>

    <!-- Loading state -->
    <div id="login-loading" class="login-loading">
      <div class="login-spinner"></div>
      <div class="login-loading-text">Verifying your account…</div>
    </div>

    <!-- User info (hidden until loaded) -->
    <div id="login-user-section" style="display:none;">

      <div class="login-user-card">
        <div class="login-avatar" id="login-avatar-char">U</div>
        <div>
          <div class="login-user-label">Signed in as</div>
          <div class="login-user-email" id="login-email-text">—</div>
        </div>
      </div>

      <!-- Has role -->
      <div id="login-has-role" style="display:none;">
        <div class="login-role-badge">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4"/>
          </svg>
          <span id="login-role-text">—</span>
        </div>
        <button class="login-btn" onclick="login_enter()">
          Enter System →
        </button>
      </div>

      <!-- No role -->
      <div id="login-no-role" style="display:none;">
        <div class="login-no-role">
          ⛔ Your account (<span id="login-noaccess-email"></span>) does not have access to this system.<br><br>
          Contact your administrator to be added to the Role_Permissions sheet.
        </div>
        <button class="login-btn" disabled>Access Denied</button>
      </div>

    </div>

    <div class="login-footer">
      Powered by Google Apps Script &nbsp;·&nbsp; OPS v1.0
    </div>

  </div>
</div>

<script>
// Called on page boot — verify the current Google user
function login_init() {
  google.script.run
    .withSuccessHandler(function(u) {
      document.getElementById('login-loading').style.display = 'none';
      document.getElementById('login-user-section').style.display = 'block';

      var email  = u.email  || '';
      var role   = u.role   || 'No Role';
      var letter = email ? email.charAt(0).toUpperCase() : 'U';

      document.getElementById('login-avatar-char').textContent = letter;
      document.getElementById('login-email-text').textContent  = email;

      if (role && role !== 'No Role') {
        document.getElementById('login-role-text').textContent  = role;
        document.getElementById('login-has-role').style.display = 'block';
        document.getElementById('login-no-role').style.display  = 'none';
      } else {
        document.getElementById('login-noaccess-email').textContent = email;
        document.getElementById('login-has-role').style.display = 'none';
        document.getElementById('login-no-role').style.display  = 'block';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('login-loading').innerHTML =
        '<div style="color:var(--red);font-size:13px;font-weight:600;">⚠️ Failed to load user info.<br>Please refresh the page.</div>';
    })
    .ops_getUserInfoPublic();
}

function login_enter() {
  // Dismiss login screen with a smooth fade-out
  var screen = document.getElementById('login-screen');
  screen.style.transition = 'opacity .4s ease';
  screen.style.opacity = '0';
  setTimeout(function() {
    screen.style.display = 'none';
    // Now boot the main app
    google.script.run
      .withSuccessHandler(function(u) {
        document.getElementById('o-user-email').textContent  = u.email || '';
        document.getElementById('o-user-avatar').textContent = (u.email || 'U').charAt(0).toUpperCase();
        document.getElementById('o-role-badge').textContent  = u.role  || 'No Role';
        switchTab('dashboard');
        init_dashboard();
      })
      .withFailureHandler(function() {
        document.getElementById('o-role-badge').textContent = 'No Role';
        switchTab('dashboard');
        init_dashboard();
      })
      .ops_getUserInfoPublic();
  }, 400);
}

// Auto-start login check on load
login_init();
</script>
